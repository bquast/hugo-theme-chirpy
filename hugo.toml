title = 'Bastiaan Quast'
enableGitInfo = true

defaultContentLanguage = "en"
defaultContentLanguageInSubdir = false

baseURL = "https://hugo-theme-chirpy.pages.dev/"
canonifyURLs = true

[pagination]
  pagerSize = 99

[params]
  theme_version = "1.0.2"
  [params.assets]
    self_host = true

[outputs]
  home = ["HTML", "RSS", "JSON"]

[taxonomies]
  category = "categories"
  tag = "tags"

[module]
[[module.imports]]
  path = "github.com/gohugoio/hugo-mod-bootstrap-scss/v5"

[[module.imports]]
  path = "github.com/geekifan/chirpy-static-assets"

[[module.imports.mounts]]
  source = "."
  target = "static/lib"

[frontmatter]
  date = [":filename", "date", "publishDate"]